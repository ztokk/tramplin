<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tramplin.io — SOL Winners Board</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#050508;
    --surface:#0d0d14;
    --surface2:#0a0a10;
    --border:#1a1a2e;
    --gold:#f5c842;
    --gold2:#e8a020;
    --green:#00e676;
    --dim:#444460;
    --text:#c8c8e0;
    --white:#f0f0ff;
    --red:#ff5c5c;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Space Mono', monospace;
    min-height:100vh;
    overflow-x:hidden;
  }
  body::before{
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
    z-index:0;
  }
  a{color:inherit;text-decoration:none}
  a:hover{text-decoration:underline}

  .container{max-width:1180px;margin:0 auto;padding:0 20px;position:relative;z-index:1}

  header{padding:44px 0 20px;text-align:center}
  .logo-line{
    font-family:'Syne',sans-serif;
    font-size:clamp(2rem,6vw,3.5rem);
    font-weight:800;
    letter-spacing:-1px;
    color:var(--white);
    line-height:1;
  }
  .logo-line span{color:var(--gold)}
  .tagline{
    margin-top:8px;
    font-size:.7rem;
    letter-spacing:4px;
    color:var(--dim);
    text-transform:uppercase;
  }
  .live-badge{
    display:inline-flex;align-items:center;gap:8px;
    margin-top:18px;
    padding:6px 16px;
    border:1px solid rgba(0,230,118,.3);
    border-radius:999px;
    font-size:.65rem;
    letter-spacing:3px;
    color:var(--green);
    text-transform:uppercase;
  }
  .pulse{
    width:6px;height:6px;border-radius:50%;
    background:var(--green);
    animation:pulse 1.5s ease infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.4;transform:scale(.7)}
  }

  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    margin:16px 0 10px;
    gap:12px;flex-wrap:wrap;
    font-size:.65rem;color:var(--dim);letter-spacing:1px;
  }
  .countdown{color:var(--gold);font-weight:700}

  .stats-bar{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin:18px 0 22px;
  }
  .stat-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px;
    text-align:center;
    position:relative;
    overflow:hidden;
    transition:border-color .25s;
  }
  .stat-card::before{
    content:'';
    position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    opacity:.5;
  }
  .stat-card:hover{border-color:rgba(245,200,66,.25)}
  .stat-value{
    font-family:'Syne',sans-serif;
    font-size:clamp(1.2rem,2.6vw,1.9rem);
    font-weight:800;
    color:var(--gold);
    line-height:1;
  }
  .stat-label{
    font-size:.6rem;
    letter-spacing:2px;
    color:var(--dim);
    text-transform:uppercase;
    margin-top:6px;
  }

  /* --- 2-column dashboard --- */
  .grid{
    display:grid;
    grid-template-columns: 1.35fr .9fr;
    gap:14px;
    margin-top:10px;
    align-items:start;
  }
  .panel{
    background:linear-gradient(180deg, rgba(245,200,66,.04), transparent 80%), var(--surface2);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
  }
  .panel-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 14px 12px;
    border-bottom:1px solid var(--border);
    background:rgba(13,13,20,.65);
    backdrop-filter: blur(6px);
  }
  .panel-title{
    font-family:'Syne',sans-serif;
    font-size:.75rem;
    font-weight:800;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--dim);
    display:flex;align-items:center;gap:8px;
  }
  .panel-sub{
    font-size:.62rem;
    color:var(--dim);
    letter-spacing:1px;
    white-space:nowrap;
  }
  .panel-body{
    padding:10px 10px 12px;
  }

  /* Leaderboard rows */
  .lb-row{
    display:grid;
    grid-template-columns: 42px 1fr 110px 86px;
    align-items:center;
    gap:10px;
    padding:12px 12px;
    border-radius:10px;
    border:1px solid transparent;
    margin-bottom:6px;
    transition: transform .18s, border-color .18s;
    background:rgba(13,13,20,.85);
  }
  .lb-row:hover{
    border-color: rgba(245,200,66,.22);
    transform: translateX(3px);
  }
  .lb-row.top1{border-color:rgba(245,200,66,.42); background:rgba(245,200,66,.07)}
  .lb-row.top2{border-color:rgba(192,192,192,.25); background:rgba(192,192,192,.04)}
  .lb-row.top3{border-color:rgba(205,127,50,.25); background:rgba(205,127,50,.04)}

  .rank{
    font-family:'Syne',sans-serif;
    font-weight:800;
    font-size:.9rem;
    text-align:center;
    color:var(--dim);
  }
  .rank.r1{color:var(--gold);font-size:1.05rem}
  .rank.r2{color:#c0c0c0}
  .rank.r3{color:#cd7f32}

  .wallet-addr{
    font-size:.75rem;
    color:var(--white);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .win-count{
    font-size:.6rem;
    color:var(--dim);
    margin-top:2px;
    letter-spacing:1px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .sol-amount{
    font-family:'Syne',sans-serif;
    font-weight:800;
    font-size:.95rem;
    color:var(--gold);
    text-align:right;
    white-space:nowrap;
  }
  .bar-wrap{
    height:3px;background:var(--border);
    border-radius:2px;overflow:hidden;
  }
  .bar{
    height:100%;
    background:linear-gradient(90deg,var(--gold2),var(--gold));
    border-radius:2px;
    transition:width .8s ease;
  }

  /* Live wins */
  .wins{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .win-item{
    display:grid;
    grid-template-columns: 1fr auto;
    gap:10px;
    align-items:center;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(13,13,20,.85);
    transition:border-color .18s, transform .18s;
  }
  .win-item:hover{
    border-color: rgba(0,230,118,.25);
    transform: translateX(2px);
  }
  .win-wallet{color:var(--white);font-size:.72rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .win-time{color:var(--dim);font-size:.6rem;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .win-sol{color:var(--green);font-weight:800;font-size:.78rem;white-space:nowrap;font-family:'Syne',sans-serif}

  .status{
    text-align:center;
    padding:26px 16px;
    color:var(--dim);
    font-size:.75rem;
    letter-spacing:2px;
  }
  .error{color:var(--red)}

  footer{
    text-align:center;
    padding:28px 0 40px;
    font-size:.6rem;
    color:var(--dim);
    letter-spacing:2px;
    border-top:1px solid var(--border);
    margin-top:18px;
  }

  @media (max-width: 980px){
    .grid{grid-template-columns:1fr}
    .stats-bar{grid-template-columns:repeat(2,1fr)}
    .lb-row{grid-template-columns:36px 1fr 98px}
    .bar-wrap{display:none}
  }
</style>
</head>

<body>
<div class="container">
  <header>
    <div class="logo-line">TRAMPLIN<span>.IO</span></div>
    <div class="tagline">SOL Winners Leaderboard</div>
    <div class="live-badge"><span class="pulse"></span> Live — auto refresh</div>
  </header>

  <div class="topbar">
    <div id="lastUpdated">Updated: —</div>
    <div>Next refresh: <span class="countdown" id="countdown">—</span></div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="statWins">—</div><div class="stat-label">Total Wins</div></div>
    <div class="stat-card"><div class="stat-value" id="statSol">—</div><div class="stat-label">SOL Distributed</div></div>
    <div class="stat-card"><div class="stat-value" id="statWallets">—</div><div class="stat-label">Unique Winners</div></div>
    <div class="stat-card"><div class="stat-value" id="statInterval">—</div><div class="stat-label">Interval (min)</div></div>
  </div>

  <div class="grid">
    <!-- Leaderboard -->
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">🏆 Leaderboard <span style="color:var(--gold)">TOP100</span></div>
        <div class="panel-sub" id="lbMeta">—</div>
      </div>
      <div class="panel-body" id="leaderboardList">
        <div class="status">Loading…</div>
      </div>
    </section>

    <!-- Live Wins -->
    <aside class="panel">
      <div class="panel-header">
        <div class="panel-title">⚡ Live Wins</div>
        <div class="panel-sub" id="winsMeta">—</div>
      </div>
      <div class="panel-body">
        <div class="wins" id="recentList">
          <div class="status">Loading…</div>
        </div>
      </div>
    </aside>
  </div>

  <footer>TRAMPLIN.IO · SOL GIVEAWAY TRACKER · DATA FROM ON-CHAIN TRANSFERS</footer>
</div>

<script>
const DATA_URL = 'winners.json';
const REFRESH_MS = 11 * 60 * 1000;

let nextRefresh = Date.now() + REFRESH_MS;

function num(x){ const n = Number(x); return Number.isFinite(n) ? n : 0; }
function fmtWallet(w){ if(!w) return '—'; return w.length > 12 ? (w.slice(0,5)+'...'+w.slice(-5)) : w; }
function fmtSol(sol){ return num(sol).toFixed(2) + ' SOL'; }

async function loadData(){
  try{
    const r = await fetch(DATA_URL + '?t=' + Date.now(), { cache:'no-store' });
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    render(data);
    nextRefresh = Date.now() + REFRESH_MS;
  }catch(e){
    document.getElementById('leaderboardList').innerHTML =
      `<div class="status error">⚠ Error loading winners.json: ${e.message}</div>`;
    document.getElementById('recentList').innerHTML =
      `<div class="status error">⚠ Error loading winners.json: ${e.message}</div>`;
  }
}

function render(data){
  const stats = data.stats || {};
  document.getElementById('statWins').textContent    = (stats.total_wins || 0).toLocaleString();
  document.getElementById('statSol').textContent     = num(stats.total_sol_distributed || 0).toFixed(2);
  document.getElementById('statWallets').textContent = (stats.unique_winners || 0).toLocaleString();
  document.getElementById('statInterval').textContent= (stats.interval_minutes || 11).toString();

  document.getElementById('lastUpdated').textContent =
    'Updated: ' + (stats.last_updated || '—');

  // Leaderboard
  const lb = data.leaderboard || [];
  document.getElementById('lbMeta').textContent =
    lb.length ? `Showing ${Math.min(100, lb.length)} wallets` : 'No data';

  const maxSol = lb.length ? num(lb[0].total_sol) : 1;
  const lbEl = document.getElementById('leaderboardList');

  if(!lb.length){
    lbEl.innerHTML = `<div class="status">No leaderboard data yet</div>`;
  } else {
    lbEl.innerHTML = lb.slice(0,100).map((e,i)=>{
      const rowClass  = i===0?'top1':i===1?'top2':i===2?'top3':'';
      const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
      const pct = Math.max(0, Math.min(100, Math.round((num(e.total_sol) / maxSol) * 100)));
      return `
        <div class="lb-row ${rowClass}">
          <div class="rank ${rankClass}">${e.rank ?? (i+1)}</div>
          <div>
            <div class="wallet-addr" title="${e.wallet}">${fmtWallet(e.wallet)}</div>
            <div class="win-count">${e.win_count || 0} wins · last ${e.last_win || '—'}</div>
          </div>
          <div class="sol-amount">${fmtSol(e.total_sol)}</div>
          <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
  }

  // Live wins
  const wins = (data.winners || []).slice(0, 40);
  document.getElementById('winsMeta').textContent =
    wins.length ? `Last ${wins.length} wins` : 'No wins';

  const recentEl = document.getElementById('recentList');
  if(!wins.length){
    recentEl.innerHTML = `<div class="status">No recent wins yet</div>`;
  } else {
    recentEl.innerHTML = wins.map(w => `
      <div class="win-item">
        <div>
          <div class="win-wallet" title="${w.wallet}">${fmtWallet(w.wallet)}</div>
          <div class="win-time">${w.time_str || '—'}</div>
        </div>
        <div class="win-sol">+${fmtSol(w.sol)}</div>
      </div>
    `).join('');
  }
}

function tick(){
  const left = Math.max(0, Math.ceil((nextRefresh - Date.now()) / 1000));
  const m = Math.floor(left / 60);
  const s = left % 60;
  document.getElementById('countdown').textContent = m + ':' + String(s).padStart(2,'0');
  if(left === 0) loadData();
}

loadData();
setInterval(tick, 1000);
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>

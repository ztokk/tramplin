<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tramplin.io — SOL Winners Board</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050508; --surface:#0d0d14; --surface2:#0a0a10;
    --border:#1a1a2e; --gold:#f5c842; --gold2:#e8a020;
    --green:#00e676; --dim:#444460; --text:#c8c8e0; --white:#f0f0ff; --red:#ff5c5c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,200,66,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,200,66,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .container{max-width:1180px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
  header{padding:44px 0 18px;text-align:center}
  .logo-line{font-family:'Syne',sans-serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:800;letter-spacing:-1px;color:var(--white);line-height:1}
  .logo-line span{color:var(--gold)}
  .tagline{margin-top:8px;font-size:.7rem;letter-spacing:4px;color:var(--dim);text-transform:uppercase}
  .live-badge{display:inline-flex;align-items:center;gap:8px;margin-top:18px;padding:6px 16px;border:1px solid rgba(0,230,118,.3);border-radius:999px;font-size:.65rem;letter-spacing:3px;color:var(--green);text-transform:uppercase}
  .pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

  .topbar{display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px;gap:12px;flex-wrap:wrap;font-size:.65rem;color:var(--dim);letter-spacing:1px}
  .countdown{color:var(--gold);font-weight:700}

  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0 14px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;position:relative;overflow:hidden;transition:border-color .25s}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
  .stat-card:hover{border-color:rgba(245,200,66,.25)}
  .stat-value{font-family:'Syne',sans-serif;font-size:clamp(1.2rem,2.6vw,1.9rem);font-weight:800;color:var(--gold);line-height:1}
  .stat-label{font-size:.6rem;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:6px}

  /* Search */
  .search-wrap{display:flex;justify-content:center;margin:10px 0 14px}
  .search-block{width:min(860px,100%)}
  .search{
    display:flex;gap:10px;align-items:center;
    background:rgba(13,13,20,.85);
    border:1px solid var(--border);
    border-radius:14px;
    padding:10px 10px;
  }
  .search input{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--white);font-family:'Space Mono',monospace;font-size:.85rem;
    padding:8px 10px;
  }
  .search input::placeholder{color:rgba(200,200,224,.35)}
  .btn{
    border:1px solid rgba(245,200,66,.35);
    background:rgba(245,200,66,.08);
    color:var(--gold);
    padding:10px 14px;
    border-radius:12px;
    font-family:'Syne',sans-serif;
    font-weight:800;
    letter-spacing:2px;
    font-size:.72rem;
    text-transform:uppercase;
    cursor:pointer;
    transition:transform .15s, border-color .15s;
    white-space:nowrap;
  }
  .btn:hover{transform:translateY(-1px);border-color:rgba(245,200,66,.55)}
  .btn.secondary{
    border:1px solid rgba(68,68,96,.6);
    background:rgba(68,68,96,.12);
    color:var(--text);
  }

  .result{
    margin-top:10px;
    background:rgba(13,13,20,.85);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
  }
  .result h3{font-family:'Syne',sans-serif;color:var(--white);font-size:.9rem;letter-spacing:2px;text-transform:uppercase}
  .result .sub{color:var(--dim);font-size:.65rem;margin-top:6px;letter-spacing:1px}
  .result .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .result .k{background:rgba(5,5,8,.6);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
  .result .k .v{font-family:'Syne',sans-serif;color:var(--gold);font-weight:800;font-size:1.1rem}
  .result .k .l{font-size:.6rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:5px}
  .status{ text-align:center; padding:16px 14px; color:var(--dim); font-size:.75rem; letter-spacing:2px; }
  .error{ color:var(--red); }

  /* Panels */
  .grid{display:grid;grid-template-columns: 1.35fr .9fr;gap:14px;margin-top:8px;align-items:start}
  .panel{background:linear-gradient(180deg, rgba(245,200,66,.04), transparent 80%), var(--surface2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 12px;border-bottom:1px solid var(--border);background:rgba(13,13,20,.65);backdrop-filter:blur(6px)}
  .panel-title{font-family:'Syne',sans-serif;font-size:.75rem;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px}
  .panel-sub{font-size:.62rem;color:var(--dim);letter-spacing:1px;white-space:nowrap}
  .panel-body{padding:10px 10px 12px}

  /* Leaderboard rows */
  .lb-row{display:grid;grid-template-columns:42px 1fr 110px 86px;align-items:center;gap:10px;padding:12px;border-radius:10px;border:1px solid transparent;margin-bottom:6px;transition:transform .18s,border-color .18s;background:rgba(13,13,20,.85)}
  .lb-row:hover{border-color:rgba(245,200,66,.22);transform:translateX(3px)}
  .lb-row.top1{border-color:rgba(245,200,66,.42);background:rgba(245,200,66,.07)}
  .lb-row.top2{border-color:rgba(192,192,192,.25);background:rgba(192,192,192,.04)}
  .lb-row.top3{border-color:rgba(205,127,50,.25);background:rgba(205,127,50,.04)}
  .lb-row.hit{ border-color: rgba(0,230,118,.35) !important; box-shadow: 0 0 0 1px rgba(0,230,118,.18) inset; }

  .rank{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;text-align:center;color:var(--dim)}
  .rank.r1{color:var(--gold);font-size:1.05rem}
  .rank.r2{color:#c0c0c0}
  .rank.r3{color:#cd7f32}
  .wallet-addr{font-size:.75rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .win-count{font-size:.6rem;color:var(--dim);margin-top:2px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sol-amount{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;color:var(--gold);text-align:right;white-space:nowrap}
  .bar-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .bar{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:2px;transition:width .8s ease}

  /* Live wins */
  .wins{display:flex;flex-direction:column;gap:6px}
  .win-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(13,13,20,.85);transition:border-color .18s,transform .18s}
  .win-item:hover{border-color:rgba(0,230,118,.25);transform:translateX(2px)}
  .win-wallet{color:var(--white);font-size:.72rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .win-time{color:var(--dim);font-size:.6rem;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .win-sol{color:var(--green);font-weight:800;font-size:.78rem;white-space:nowrap;font-family:'Syne',sans-serif}

  footer{text-align:center;padding:28px 0 40px;font-size:.6rem;color:var(--dim);letter-spacing:2px;border-top:1px solid var(--border);margin-top:18px}

  @media (max-width:980px){
    .grid{grid-template-columns:1fr}
    .stats-bar{grid-template-columns:repeat(2,1fr)}
    .lb-row{grid-template-columns:36px 1fr 98px}
    .bar-wrap{display:none}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-line">TRAMPLIN<span>.IO</span></div>
    <div class="tagline">SOL Winners Leaderboard</div>
    <div class="live-badge"><span class="pulse"></span> Live — auto refresh</div>
  </header>

  <div class="topbar">
    <div id="lastUpdated">Updated: —</div>
    <div>Next refresh: <span class="countdown" id="countdown">—</span></div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="statWins">—</div><div class="stat-label">Total Wins</div></div>
    <div class="stat-card"><div class="stat-value" id="statSol">—</div><div class="stat-label">SOL Distributed</div></div>
    <div class="stat-card"><div class="stat-value" id="statWallets">—</div><div class="stat-label">Unique Winners</div></div>
    <div class="stat-card"><div class="stat-value" id="statInterval">—</div><div class="stat-label">Interval (min)</div></div>
  </div>

  <!-- Search (Top100 only) -->
  <div class="search-wrap">
    <div class="search-block">
      <div class="search">
        <input id="walletInput" placeholder="Search wallet in Top100 (paste wallet address)…" autocomplete="off" spellcheck="false" />
        <button class="btn" id="searchBtn">Search</button>
        <button class="btn secondary" id="clearBtn">Clear</button>
      </div>
      <div id="searchResult"></div>
    </div>
  </div>

  <div class="grid">
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">🏆 Leaderboard <span style="color:var(--gold)">TOP100</span></div>
        <div class="panel-sub" id="lbMeta">—</div>
      </div>
      <div class="panel-body" id="leaderboardList"><div class="status">Loading…</div></div>
    </section>

    <aside class="panel">
      <div class="panel-header">
        <div class="panel-title">⚡ Live Wins</div>
        <div class="panel-sub" id="winsMeta">—</div>
      </div>
      <div class="panel-body">
        <div class="wins" id="recentList"><div class="status">Loading…</div></div>
      </div>
    </aside>
  </div>

  <footer>TRAMPLIN.IO · SOL GIVEAWAY TRACKER</footer>
</div>

<script>
const FULL_URL = 'winners_full.json';
const LIVE_URL = 'winners_live.json';
const REFRESH_MS = 11 * 60 * 1000;
let nextRefresh = Date.now() + REFRESH_MS;

let FULL = null;
let LIVE = null;

function num(x){ const n = Number(x); return Number.isFinite(n) ? n : 0; }
function fmtWallet(w){ if(!w) return '—'; return w.length > 12 ? (w.slice(0,5)+'...'+w.slice(-5)) : w; }
function looksLikeWallet(s){ return typeof s === 'string' && s.length >= 32 && s.length <= 60; }

async function loadAll(){
  try{
    const [rf, rl] = await Promise.all([
      fetch(FULL_URL + '?t=' + Date.now(), { cache:'no-store' }),
      fetch(LIVE_URL + '?t=' + Date.now(), { cache:'no-store' })
    ]);
    if(!rf.ok) throw new Error('FULL HTTP ' + rf.status);
    if(!rl.ok) throw new Error('LIVE HTTP ' + rl.status);
    FULL = await rf.json();
    LIVE = await rl.json();
    render();
    nextRefresh = Date.now() + REFRESH_MS;
  }catch(e){
    document.getElementById('leaderboardList').innerHTML = `<div class="status error">⚠ ${e.message}</div>`;
    document.getElementById('recentList').innerHTML = `<div class="status error">⚠ ${e.message}</div>`;
  }
}

function render(){
  const stats = (FULL && FULL.stats) ? FULL.stats : {};
  document.getElementById('statWins').textContent    = (stats.total_wins || 0).toLocaleString();
  document.getElementById('statSol').textContent     = num(stats.total_sol_distributed || 0).toFixed(2);
  document.getElementById('statWallets').textContent = (stats.unique_winners || 0).toLocaleString();
  document.getElementById('statInterval').textContent= (stats.interval_minutes || 11).toString();
  document.getElementById('lastUpdated').textContent = 'Updated: ' + (stats.last_updated || '—');

  // Leaderboard
  const lb = (FULL && FULL.leaderboard) ? FULL.leaderboard : [];
  document.getElementById('lbMeta').textContent = lb.length ? `Top ${Math.min(100, lb.length)} wallets` : 'No data';

  const maxSol = lb.length ? num(lb[0].total_sol) : 1;
  const lbEl = document.getElementById('leaderboardList');

  if(!lb.length){
    lbEl.innerHTML = `<div class="status">No leaderboard data yet</div>`;
  } else {
    lbEl.innerHTML = lb.slice(0,100).map((e,i)=>{
      const rowClass  = i===0?'top1':i===1?'top2':i===2?'top3':'';
      const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
      const pct = Math.max(0, Math.min(100, Math.round((num(e.total_sol) / maxSol) * 100)));
      return `
        <div class="lb-row ${rowClass}" data-wallet="${e.wallet}">
          <div class="rank ${rankClass}">${e.rank ?? (i+1)}</div>
          <div>
            <div class="wallet-addr" title="Hidden">${fmtWallet(e.wallet)}</div>
            <div class="win-count">${e.win_count || 0} wins · last ${e.last_win || '—'}</div>
          </div>
          <div class="sol-amount">${num(e.total_sol).toFixed(2)} SOL</div>
          <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
  }

  // Live wins
  const wins = (LIVE && LIVE.winners) ? LIVE.winners : [];
  document.getElementById('winsMeta').textContent = wins.length ? `Last ${wins.length} wins` : 'No wins';
  const recentEl = document.getElementById('recentList');

  if(!wins.length){
    recentEl.innerHTML = `<div class="status">No recent wins yet</div>`;
  } else {
    recentEl.innerHTML = wins.slice(0, 80).map(w => `
      <div class="win-item">
        <div>
          <div class="win-wallet" title="Hidden">${fmtWallet(w.wallet)}</div>
          <div class="win-time">${w.time_str || '—'}</div>
        </div>
        <div class="win-sol">+${num(w.sol).toFixed(2)} SOL</div>
      </div>
    `).join('');
  }
}

function clearHighlight(){
  document.querySelectorAll('.lb-row.hit').forEach(el => el.classList.remove('hit'));
}

function searchTop100(){
  const q = (document.getElementById('walletInput').value || '').trim();
  const out = document.getElementById('searchResult');

  if(!FULL || !FULL.leaderboard){
    out.innerHTML = `<div class="result"><div class="status">Data not loaded yet</div></div>`;
    return;
  }
  if(!looksLikeWallet(q)){
    out.innerHTML = `<div class="result"><div class="status error">Enter a valid wallet address</div></div>`;
    clearHighlight();
    return;
  }

  const row = (FULL.leaderboard || []).find(r => r.wallet === q);
  clearHighlight();

  if(!row){
    out.innerHTML = `
      <div class="result">
        <h3>Not in Top100</h3>
        <div class="sub">This search only checks the Top100 leaderboard.</div>
      </div>`;
    return;
  }

  // Highlight and scroll into view
  const el = document.querySelector(`.lb-row[data-wallet="${CSS.escape(q)}"]`);
  if(el){
    el.classList.add('hit');
    el.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  out.innerHTML = `
    <div class="result">
      <h3>Found in Top100</h3>
      <div class="sub">Wallet: ${fmtWallet(q)} (hidden)</div>
      <div class="kpis">
        <div class="k"><div class="v">#${row.rank}</div><div class="l">Rank</div></div>
        <div class="k"><div class="v">${row.win_count || 0}</div><div class="l">Wins</div></div>
        <div class="k"><div class="v">${num(row.total_sol).toFixed(2)}</div><div class="l">Total SOL</div></div>
      </div>
      <div class="sub" style="margin-top:10px">Last win: ${row.last_win || '—'}</div>
    </div>`;
}

function clearSearch(){
  document.getElementById('walletInput').value = '';
  document.getElementById('searchResult').innerHTML = '';
  clearHighlight();
}

function tick(){
  const left = Math.max(0, Math.ceil((nextRefresh - Date.now()) / 1000));
  const m = Math.floor(left / 60);
  const s = left % 60;
  document.getElementById('countdown').textContent = m + ':' + String(s).padStart(2,'0');
  if(left === 0) loadAll();
}

document.getElementById('searchBtn').addEventListener('click', searchTop100);
document.getElementById('clearBtn').addEventListener('click', clearSearch);
document.getElementById('walletInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') searchTop100(); });

loadAll();
setInterval(tick, 1000);
setInterval(loadAll, REFRESH_MS);
</script>
</body>
</html>

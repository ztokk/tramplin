<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tramplin.io — Winners Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f5f5f3;
    --surface: #ffffff;
    --border:  #e8e8e5;
    --border2: #f0f0ed;
    --text:    #111111;
    --dim:     #888880;
    --dim2:    #bbbbb5;
    --green:   #19a974;
    --sol:     #9945FF;
  }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
-webkit-font-smoothing: antialiased;
}

.container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

/* ── Header ── */
header {
padding: 36px 0 28px;
border-bottom: 1px solid var(–border);
margin-bottom: 0;
}

.header-inner {
display: flex;
justify-content: space-between;
align-items: flex-end;
gap: 16px;
}

.logo {
font-size: 1rem;
font-weight: 700;
color: var(–text);
letter-spacing: -0.2px;
}

.logo-sub {
font-size: 0.68rem;
color: var(–dim);
margin-top: 3px;
font-weight: 400;
}

.header-right {
text-align: right;
flex-shrink: 0;
}

.live-row {
display: flex;
align-items: center;
justify-content: flex-end;
gap: 6px;
font-size: 0.68rem;
color: var(–dim);
font-family: ‘DM Mono’, monospace;
}

.live-dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–green);
animation: blink 2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.updated-row {
font-size: 0.68rem;
color: var(–dim2);
font-family: ‘DM Mono’, monospace;
margin-top: 3px;
}

/* ── Stats ── */
.stats-bar {
display: grid;
grid-template-columns: repeat(3, 1fr);
border-bottom: 1px solid var(–border);
}

.stat-card {
padding: 24px 0 24px;
}
.stat-card + .stat-card {
border-left: 1px solid var(–border);
padding-left: 24px;
}

.stat-value {
font-size: clamp(1.5rem, 3.5vw, 2.2rem);
font-weight: 700;
color: var(–text);
line-height: 1;
font-variant-numeric: tabular-nums;
display: flex;
align-items: center;
gap: 7px;
}

.stat-label {
font-size: 0.68rem;
color: var(–dim);
margin-top: 5px;
}

/* Solana logo SVG */
.sol-logo {
width: 26px; height: 26px;
flex-shrink: 0;
}

.sol-sm {
width: 16px; height: 16px;
flex-shrink: 0;
vertical-align: middle;
}

/* ── Section header ── */
.section-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 18px 0 10px;
border-bottom: 1px solid var(–border);
}

.section-title {
font-size: 0.68rem;
font-weight: 600;
color: var(–dim);
letter-spacing: 0.6px;
text-transform: uppercase;
}

.section-meta {
font-size: 0.65rem;
color: var(–dim2);
font-family: ‘DM Mono’, monospace;
}

/* ── Leaderboard ── */
.lb-head {
display: grid;
grid-template-columns: 36px 1fr 120px 60px;
padding: 8px 0;
border-bottom: 1px solid var(–border);
font-size: 0.62rem;
font-weight: 600;
color: var(–dim2);
letter-spacing: 0.4px;
text-transform: uppercase;
}
.lb-head .ar { text-align: right; }

.lb-row {
display: grid;
grid-template-columns: 36px 1fr 120px 60px;
padding: 12px 0;
border-bottom: 1px solid var(–border2);
align-items: center;
opacity: 0;
transform: translateY(5px);
transition: opacity 0.28s ease, transform 0.28s ease;
}
.lb-row.visible { opacity: 1; transform: translateY(0); }
.lb-row:hover { background: rgba(0,0,0,0.02); margin: 0 -24px; padding-left: 24px; padding-right: 24px; }

.rank {
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
color: var(–dim2);
}
.rank.top { color: var(–text); font-weight: 500; }

.wallet-info { min-width: 0; }

.wallet-addr {
font-family: ‘DM Mono’, monospace;
font-size: 0.76rem;
color: var(–text);
}

.wallet-sub {
font-size: 0.6rem;
color: var(–dim2);
margin-top: 1px;
}

.ar { text-align: right; }

.won-val {
font-family: ‘DM Mono’, monospace;
font-size: 0.78rem;
font-weight: 500;
color: var(–text);
display: flex;
align-items: center;
justify-content: flex-end;
gap: 4px;
}

font-weight: 500;
color: var(--green);
display: flex;
align-items: center;
justify-content: flex-end;
gap: 4px;
```

}

.wins-num {
font-family: ‘DM Mono’, monospace;
font-size: 0.72rem;
color: var(–dim);
text-align: right;
}

/* ── Recent ── */
.recent-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 0;
border-bottom: 1px solid var(–border2);
gap: 12px;
opacity: 0;
transform: translateY(4px);
transition: opacity 0.25s ease, transform 0.25s ease;
}
.recent-row.visible { opacity: 1; transform: translateY(0); }

.recent-wallet {
font-family: ‘DM Mono’, monospace;
font-size: 0.73rem;
color: var(–text);
}

.recent-sol {
font-family: ‘DM Mono’, monospace;
font-size: 0.73rem;
font-weight: 500;
color: var(–text);
display: flex;
align-items: center;
gap: 4px;
flex-shrink: 0;
}

.recent-time {
font-size: 0.62rem;
color: var(–dim2);
text-align: right;
flex-shrink: 0;
}

/* ── Skeleton ── */
.skel {
background: linear-gradient(90deg, var(–border) 25%, #ebebea 50%, var(–border) 75%);
background-size: 200% 100%;
animation: shimmer 1.4s infinite;
border-radius: 3px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.skel-row {
display: flex;
align-items: center;
gap: 14px;
padding: 14px 0;
border-bottom: 1px solid var(–border2);
}

.search-input {
font-family: ‘DM Mono’, monospace;
font-size: 0.68rem;
color: var(–text);
background: var(–surface);
border: 1px solid var(–border);
border-radius: 4px;
padding: 5px 10px;
width: 160px;
outline: none;
transition: border-color 0.15s;
}
.search-input::placeholder { color: var(–dim2); }
.search-input:focus { border-color: var(–dim); }

@media (max-width: 600px) {
.search-input { width: 110px; font-size: 0.62rem; }
}

/* ── Tabs ── */
.tabs {
display: flex;
border-bottom: 1px solid var(–border);
}

.tab-btn {
padding: 16px 24px;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.72rem;
font-weight: 600;
letter-spacing: 0.5px;
text-transform: uppercase;
color: var(–dim);
background: none;
border: none;
border-bottom: 2px solid transparent;
cursor: pointer;
transition: color 0.15s, border-color 0.15s;
margin-bottom: -1px;
}

.tab-btn:hover { color: var(–text); }
.tab-btn.active { color: var(–text); border-bottom-color: var(–text); }

.tab-panel { display: none; padding-top: 0; }
.tab-panel.active { display: block; }

.header-links {
display: flex;
align-items: center;
justify-content: flex-end;
gap: 6px;
margin-top: 6px;
}

.header-link {
display: flex;
align-items: center;
gap: 4px;
font-size: 0.65rem;
font-weight: 600;
color: var(–text);
text-decoration: none;
border: 1px solid var(–border);
border-radius: 99px;
padding: 4px 10px;
background: var(–surface);
transition: border-color 0.15s, background 0.15s;
}
.header-link:hover { border-color: var(–dim); background: var(–bg); }

.donation-copy {
display: flex;
align-items: center;
gap: 5px;
font-size: 0.65rem;
color: var(–dim);
cursor: pointer;
border: 1px solid var(–border);
border-radius: 99px;
padding: 4px 10px;
background: var(–surface);
transition: border-color 0.15s, background 0.15s;
white-space: nowrap;
}
.donation-copy:hover { border-color: var(–dim); background: var(–bg); }
.don-addr { font-family: ‘DM Mono’, monospace; color: var(–text); }
.don-status { color: var(–dim2); }

@media (max-width: 600px) {
.header-links { justify-content: flex-start; }
.donation-copy { font-size: 0.6rem; }
}

/* ── Footer ── */
footer {
padding: 24px 0 48px;
margin-top: 32px;
border-top: 1px solid var(–border);
display: flex;
justify-content: space-between;
align-items: center;
flex-wrap: wrap;
gap: 8px;
font-size: 0.62rem;
color: var(–dim2);
}

/* ── Mobile ── */
@media (max-width: 600px) {
.header-inner { flex-direction: column; align-items: flex-start; }
.header-right { text-align: left; }
.live-row { justify-content: flex-start; }

.stat-value { font-size: 1.2rem; }

.lb-row { grid-template-columns: 30px 1fr 100px 50px; }
```

}

@media (max-width: 380px) {
.lb-head,
.lb-row { grid-template-columns: 26px 1fr 90px; }
.lb-head .col-wins,
.lb-row .col-wins { display: none; }
}
</style>

</head>
<body>
<div class="container">

  <header>
    <div class="header-inner">
      <div>
        <div class="logo">Tramplin.io — Winners Board</div>
        <div class="logo-sub">Community leaderboard · Not affiliated with Tramplin.io</div>
      </div>
      <div class="header-right">
        <div class="live-row">
          <div class="live-dot"></div>
          Hourly updates · <span id="lastUpdated">—</span>
        </div>
        <div class="header-links">
          <a href="https://x.com/ztokk_" target="_blank" class="header-link">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            @ztokk_
          </a>
          <span class="donation-copy" onclick="navigator.clipboard.writeText('9fs79jdWVk731RbiSmG3BQ4pFkhCwd9LpZELhsvhssEn');this.querySelector('.don-status').textContent='Copied!';setTimeout(()=>this.querySelector('.don-status').textContent='tap to copy',1500)">
            Donations · <span class="don-addr">9fs79j..ssEn</span> · <span class="don-status">tap to copy</span>
          </span>
        </div>
      </div>
    </div>
  </header>

  <!-- Stats -->

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value" id="statWins">—</div>
      <div class="stat-label">Total wins</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">
        <img src="sol.png" class="sol-logo" alt="SOL">
        <span id="statSol">—</span>
      </div>
      <div class="stat-label">SOL distributed</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statWallets">—</div>
      <div class="stat-label">Unique winners</div>
    </div>
  </div>

  <!-- Tabs -->

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('leaderboard')">Leaderboard</button>
    <button class="tab-btn" onclick="switchTab('livewins')">Live Wins</button>
  </div>

  <!-- Leaderboard Panel -->

  <div class="tab-panel active" id="panel-leaderboard">
    <div style="margin-bottom:48px">
      <div class="section-header">
        <div class="section-title">Top 100 Leaderboard</div>
        <div style="display:flex;align-items:center;gap:12px">
          <input id="walletSearch" class="search-input" type="text" placeholder="Search wallet..." oninput="filterLeaderboard(this.value)">
          <div class="section-meta" id="lbMeta">—</div>
        </div>
      </div>
      <div class="lb-head">
        <div>#</div>
        <div>Wallet</div>
        <div class="ar">Won</div>
        <div class="ar col-wins">Wins</div>
      </div>
      <div id="leaderboardList">
        <div class="skel-row"><div class="skel" style="width:28px;height:13px;flex-shrink:0"></div><div class="skel" style="flex:1;height:13px"></div><div class="skel" style="width:70px;height:13px"></div></div>
        <div class="skel-row"><div class="skel" style="width:28px;height:13px;flex-shrink:0"></div><div class="skel" style="flex:1;height:13px"></div><div class="skel" style="width:70px;height:13px"></div></div>
        <div class="skel-row"><div class="skel" style="width:28px;height:13px;flex-shrink:0"></div><div class="skel" style="flex:1;height:13px"></div><div class="skel" style="width:70px;height:13px"></div></div>
        <div class="skel-row"><div class="skel" style="width:28px;height:13px;flex-shrink:0"></div><div class="skel" style="flex:1;height:13px"></div><div class="skel" style="width:70px;height:13px"></div></div>
        <div class="skel-row"><div class="skel" style="width:28px;height:13px;flex-shrink:0"></div><div class="skel" style="flex:1;height:13px"></div><div class="skel" style="width:70px;height:13px"></div></div>
      </div>
    </div>
  </div>

  <!-- Live Wins Panel -->

  <div class="tab-panel" id="panel-livewins">
    <div style="margin-bottom:48px">
      <div class="section-header">
        <div class="section-title">Live Wins</div>
        <div class="section-meta">Last 30</div>
      </div>
      <div id="recentList"></div>
    </div>
  </div>

  <footer>
    <span>Not affiliated with Tramplin.io</span>
  </footer>

</div>

<script>
const WINNERS_URL = 'winners.json';
const REFRESH_MS  = 60 * 60 * 1000;

const SOL_SVG = '';

let cachedWinners = [];

function fmt(w) { return w.slice(0,4) + '..' + w.slice(-4); }

function animateCounter(el, target, duration, decimals) {
  const start = Date.now();
  function step() {
    const p    = Math.min((Date.now() - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val  = ease * target;
    el.textContent = decimals ? val.toFixed(decimals) : Math.floor(val).toLocaleString();
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = decimals ? target.toFixed(decimals) : target.toLocaleString();
  }
  requestAnimationFrame(step);
}

function filterLeaderboard(query) {
  const q = query.trim().toLowerCase();
  const rows = document.querySelectorAll('#leaderboardList .lb-row');
  let visible = 0;
  rows.forEach(row => {
    const wallet = row.dataset.wallet || '';
    const match = !q || wallet.toLowerCase().includes(q);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  document.getElementById('lbMeta').textContent = q
    ? (visible + ' found')
    : (rows.length + ' wallets');
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['leaderboard','livewins'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  // Lazy load live wins when first clicked
  if (name === 'livewins') {
    const el = document.getElementById('recentList');
    if (el && el.children.length === 0) renderRecent();
  }
}

function renderRecent() {
  const recentEl = document.getElementById('recentList');
  if (!cachedWinners.length) {
    recentEl.innerHTML = '<div style="padding:32px 0;color:var(--dim2);font-size:0.75rem">No data yet</div>';
    return;
  }
  recentEl.innerHTML = cachedWinners.slice(0, 30).map((w, i) =>
    '<div class="recent-row" data-i="' + i + '">' +
      '<div class="recent-wallet">' + fmt(w.wallet) + '</div>' +
      '<div class="recent-sol">' + SOL_SVG + parseFloat(w.sol).toFixed(4) + '</div>' +
      '<div class="recent-time">' + w.time_str + '</div>' +
    '</div>'
  ).join('');
  recentEl.querySelectorAll('.recent-row').forEach(row => {
    setTimeout(() => row.classList.add('visible'), parseInt(row.dataset.i) * 28);
  });
}

async function loadData() {
  try {
    const r = await fetch(WINNERS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    render(await r.json());
  } catch(e) {
    document.getElementById('leaderboardList').innerHTML =
      '<div style="padding:32px 0;color:#e05252;font-size:0.75rem">Error: ' + e.message + '</div>';
  }
}

function render(data) {
  const stats = data.stats || {};
  const upd   = stats.last_updated || '—';

  animateCounter(document.getElementById('statWins'),    stats.total_wins || 0,            1500);
  animateCounter(document.getElementById('statSol'),     stats.total_sol_distributed || 0, 1700, 2);
  animateCounter(document.getElementById('statWallets'), stats.unique_winners || 0,         1300);

  document.getElementById('lastUpdated').textContent = upd;

  // Leaderboard
  const lb = data.leaderboard || [];
  document.getElementById('lbMeta').textContent = lb.length + ' wallets';

  const lbEl = document.getElementById('leaderboardList');
  lbEl.innerHTML = lb.map((e, i) => {
    const topCls     = i < 3 ? 'top' : '';

    return '<div class="lb-row" data-i="' + i + '" data-wallet="' + e.wallet + '">' +
      '<div class="rank ' + topCls + '">' + e.rank + '</div>' +
      '<div class="wallet-info">' +
        '<div class="wallet-addr">' + fmt(e.wallet) + '</div>' +
        '<div class="wallet-sub">last ' + e.last_win + '</div>' +
      '</div>' +
      '<div class="ar"><div class="won-val">' + SOL_SVG + parseFloat(e.total_sol).toFixed(2) + '</div></div>' +
      '<div class="ar col-wins"><div class="wins-num">' + e.win_count + 'x</div></div>' +
    '</div>';
  }).join('');

  lbEl.querySelectorAll('.lb-row').forEach(row => {
    setTimeout(() => row.classList.add('visible'), parseInt(row.dataset.i) * 22);
  });

  // Cache for live wins tab
  cachedWinners = data.winners || [];

  // If live wins tab is open, re-render it
  if (document.getElementById('panel-livewins').classList.contains('active')) {
    renderRecent();
  } else {
    // Reset so it re-renders fresh when tab is opened
    document.getElementById('recentList').innerHTML = '';
  }
}

loadData();
setInterval(loadData, REFRESH_MS);
</script>

</body>
</html>

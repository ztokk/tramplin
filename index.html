<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tramplin.io — SOL Winners Board</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --border: #1a1a2e;
    --gold: #f5c842;
    --gold2: #e8a020;
    --green: #00e676;
    --dim: #444460;
    --text: #c8c8e0;
    --white: #f0f0ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  a { color: inherit; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  header {
    padding: 48px 0 32px;
    text-align: center;
    position: relative;
  }

  .logo-line {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--white);
    line-height: 1;
  }

  .logo-line span {
    color: var(--gold);
    position: relative;
  }

  .tagline {
    margin-top: 8px;
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    padding: 6px 16px;
    border: 1px solid rgba(0,230,118,0.3);
    border-radius: 100px;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--green);
    text-transform: uppercase;
  }

  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 32px 0;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }

  .stat-card:hover { border-color: rgba(245,200,66,0.3); }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .meta-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 1px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .countdown { color: var(--gold); font-weight: 700; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .leaderboard { margin-bottom: 48px; }

  .lb-row {
    display: grid;
    grid-template-columns: 44px 1fr 120px 80px;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid transparent;
    margin-bottom: 6px;
    transition: all 0.2s;
    background: var(--surface);
    animation: fadeIn 0.4s ease both;
  }

  .lb-row:hover {
    border-color: rgba(245,200,66,0.2);
    transform: translateX(4px);
  }

  .lb-row.top1 { border-color: rgba(245,200,66,0.4); background: rgba(245,200,66,0.06); }
  .lb-row.top2 { border-color: rgba(192,192,192,0.3); background: rgba(192,192,192,0.04); }
  .lb-row.top3 { border-color: rgba(205,127,50,0.3); background: rgba(205,127,50,0.04); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .rank {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    text-align: center;
    color: var(--dim);
  }

  .rank.r1 { color: var(--gold); font-size: 1.1rem; }
  .rank.r2 { color: #c0c0c0; }
  .rank.r3 { color: #cd7f32; }

  .wallet-info { min-width: 0; }

  .wallet-addr {
    font-size: 0.75rem;
    color: var(--white);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .win-count {
    font-size: 0.6rem;
    color: var(--dim);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  .sol-amount {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    color: var(--gold);
    text-align: right;
    white-space: nowrap;
  }

  .sol-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .sol-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold2), var(--gold));
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .recent { margin-bottom: 48px; }

  .win-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 5px;
    font-size: 0.7rem;
    animation: slideIn 0.3s ease both;
    transition: border-color 0.2s;
    gap: 10px;
  }

  .win-item:hover { border-color: rgba(0,230,118,0.2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .win-wallet { color: var(--text); font-family: 'Space Mono', monospace; }
  .win-sol { color: var(--green); font-weight: 700; white-space: nowrap; }
  .win-time { color: var(--dim); font-size: 0.6rem; white-space: nowrap; }

  .status-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-size: 0.75rem;
    letter-spacing: 2px;
  }

  .error-msg { color: #ff5555; }

  footer {
    text-align: center;
    padding: 24px 0 40px;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 2px;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .stats-bar .stat-card:last-child { grid-column: 1 / -1; }
    .lb-row { grid-template-columns: 36px 1fr 90px; }
    .sol-bar-wrap { display: none; }
    .win-time { display: none; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo-line">TRAMPLIN<span>.IO</span></div>
    <div class="tagline">SOL Winners Leaderboard</div>
    <div class="live-badge"><div class="pulse"></div> Live — updates every 11 min</div>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="stat-value" id="statWins">—</div><div class="stat-label">Total Wins</div></div>
    <div class="stat-card"><div class="stat-value" id="statSol">—</div><div class="stat-label">SOL Distributed</div></div>
    <div class="stat-card"><div class="stat-value" id="statWallets">—</div><div class="stat-label">Unique Winners</div></div>
  </div>

  <div class="meta-bar">
    <span id="lastUpdated">Loading...</span>
    <span>Next refresh: <span class="countdown" id="countdown">—</span></span>
  </div>

  <div class="leaderboard">
    <div class="section-title">🏆 Top 100 Leaderboard</div>
    <div id="leaderboardList"><div class="status-msg">Loading...</div></div>
  </div>

  <div class="recent">
    <div class="section-title">⚡ Recent Wins</div>
    <div id="recentList"><div class="status-msg">Loading...</div></div>
  </div>

  <footer>TRAMPLIN.IO · SOL GIVEAWAY TRACKER · AUTO-REFRESH 11 MIN</footer>

</div>

<script>
const DATA_URL = 'winners.json';
const REFRESH_MS = 11 * 60 * 1000;

let nextRefresh = Date.now() + REFRESH_MS;

function fmt(wallet) {
  if (!wallet || wallet.length < 12) return wallet || '—';
  return wallet.slice(0, 5) + '...' + wallet.slice(-5);
}

function num(x) {
  const n = Number(x);
  return Number.isFinite(n) ? n : 0;
}

function fmtSol(sol) {
  return num(sol).toFixed(2) + ' SOL';
}

async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    render(data);
    nextRefresh = Date.now() + REFRESH_MS;
  } catch(e) {
    document.getElementById('leaderboardList').innerHTML =
      '<div class="status-msg error-msg">⚠ Error loading data: ' + e.message + '</div>';
  }
}

function render(data) {
  const stats = data.stats || {};
  document.getElementById('statWins').textContent    = (stats.total_wins || 0).toLocaleString();
  document.getElementById('statSol').textContent     = num(stats.total_sol_distributed || 0).toFixed(2);
  document.getElementById('statWallets').textContent = (stats.unique_winners || 0).toLocaleString();
  document.getElementById('lastUpdated').textContent = 'Updated: ' + (stats.last_updated || '—');

  const lb = data.leaderboard || [];
  const maxSol = lb.length ? num(lb[0].total_sol) : 1;
  const lbEl = document.getElementById('leaderboardList');

  if (!lb.length) {
    lbEl.innerHTML = '<div class="status-msg">No data yet</div>';
  } else {
    lbEl.innerHTML = lb.map((e, i) => {
      const rowClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
      const pct = Math.max(0, Math.min(100, Math.round((num(e.total_sol) / maxSol) * 100)));
      const delay = Math.min(i * 30, 600);

      return `
        <div class="lb-row ${rowClass}" style="animation-delay:${delay}ms">
          <div class="rank ${rankClass}">${e.rank ?? (i+1)}</div>
          <div class="wallet-info">
            <div class="wallet-addr">${fmt(e.wallet)}</div>
            <div class="win-count">${e.win_count || 0} win${(e.win_count || 0) !== 1 ? 's' : ''} · last ${e.last_win || '—'}</div>
          </div>
          <div class="sol-amount">${fmtSol(e.total_sol)}</div>
          <div class="sol-bar-wrap"><div class="sol-bar" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
  }

  const wins = (data.winners || []).slice(0, 30);
  const recentEl = document.getElementById('recentList');

  if (!wins.length) {
    recentEl.innerHTML = '<div class="status-msg">No recent wins</div>';
  } else {
    recentEl.innerHTML = wins.map((w, i) => `
      <div class="win-item" style="animation-delay:${i * 20}ms">
        <span class="win-wallet">${fmt(w.wallet)}</span>
        <span class="win-sol">+${fmtSol(w.sol)}</span>
        <span class="win-time">${w.time_str || '—'}</span>
      </div>`).join('');
  }
}

function updateCountdown() {
  const left = Math.max(0, Math.ceil((nextRefresh - Date.now()) / 1000));
  const m = Math.floor(left / 60);
  const s = left % 60;
  document.getElementById('countdown').textContent = m + ':' + String(s).padStart(2, '0');
  if (left === 0) loadData();
}

loadData();
setInterval(updateCountdown, 1000);
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>

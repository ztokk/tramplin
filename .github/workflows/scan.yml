name: Tramplin Hourly Scan

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger

jobs:
  scan-winners:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run winners scan
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sed -i "s/DEIN_HELIUS_API_KEY/$HELIUS_API_KEY/" scan.py
          sed -i "s/DEIN_GITHUB_TOKEN/$GH_TOKEN/" scan.py
          python scan.py

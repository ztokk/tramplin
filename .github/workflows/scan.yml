name: Tramplin Heliusx Scanner

on:
schedule:
- cron: "*/5 * * * *"
workflow_dispatch:

concurrency:
group: tramplin-scan
cancel-in-progress: true

permissions:
contents: write

jobs:
scan:
runs-on: ubuntu-latest
steps:
  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      pip install requests

  - name: Run scanner
    env:
      HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
      CONTRACT: "3NJyzGWjSHP4hZvsqakodi7jAtbufwd52vn1ek6EzQ35"
      MIN_SOL: "0.05"
      INTERVAL_MINUTES: "11"
      MAX_PAGES: "50"
      FULL_FILE: "winners_full.json"
      LIVE_FILE: "winners_live.json"
      LIVE_LIMIT: "50"
    run: |
      python scanner.py

  - name: Commit and push updates
    run: |
      if git diff --quiet; then
        echo "No changes."
        exit 0
      fi

      git config user.name "tramplin-bot"
      git config user.email "tramplin-bot@users.noreply.github.com"

      git add winners_full.json winners_live.json

      git commit -m "Update winners data" || true

      # fix for 'fetch first' errors
      git pull --rebase origin main

      git push
```

name: Scan winners

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: tramplin-scan
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run scanner
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          CONTRACT: "3NJyzGWjSHP4hZvsqakodi7jAtbufwd52vn1ek6EzQ35"
          MIN_SOL: "0.05"
          INTERVAL_MINUTES: "11"
          MAX_PAGES: "50"
          OUT_FILE: "winners.json"
        run: python scanner.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "tramplin-bot"
          git config user.email "tramplin-bot@users.noreply.github.com"

          git add winners.json
          git commit -m "Update winners.json"
          git push

name: Daily SOL Winners Scan

on:
  schedule:
    # Täglich um 00:30 UTC (02:30 MEZ / 01:30 MESZ)
    - cron: '30 0 * * *'
  workflow_dispatch:
    # Auch manuell ausführbar über GitHub UI (Button)

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repo auschecken
        uses: actions/checkout@v4

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Dependencies installieren
        run: pip install requests

      - name: 🔍 Transaktionen scannen
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: python scan.py

      - name: 💾 winners.json committen & pushen
        run: |
          git config --global user.name "Tramplin Bot"
          git config --global user.email "bot@tramplin.io"
          git add winners.json
          git diff --staged --quiet || git commit -m "🏆 Daily update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
